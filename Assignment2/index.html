<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <nav>
            <div class="brand">
                <img src="./assets/logo.png" alt="logo">
                <p>ScaleX</p>
            </div>
            <div class="navbar">
                <a href="">Home</a>
                <a href="">About Us</a>
                <a href="">Blogs</a>
                <a href="">Contact Us</a>
            </div>
            <div class="btn">
                <button>Get Started</button>
            </div>
        </nav>

        <div class="tag-line">
            <p>Insights & Blogs</p>
        </div>

        <div class="option-bar">
            <button>All</button>
            <button>Tech</button>
            <button>SaaS</button>
            <button>Maketing</button>
        </div>

        <div class="cards">
            <div class="card" id="card1">
                <div class="top"></div>
                <div class="bottom">
                    <button>Tech</button>
                    <p id="bottom-info">The Ultimate Guide to SaaS Marketing</p>

                </div>
            </div>
            <div class="card" id="card2">
                <div class="top"></div>
                <div class="bottom">
                    <button>SaaS</button>
                    <p id="bottom-info">5 Key Trends in SaaS Growth for 2026</p>
                    <p>May 23, 2026</p>
                </div></div>
            <div class="card" id="card3">
                <div class="top"></div>
                <div class="bottom">
                    <button>Marketing</button>
                    <p id="bottom-info">How Data-Driven Strategies are Inportant</p>
                    <p>May 23, 2026</p>
                </div></div>
